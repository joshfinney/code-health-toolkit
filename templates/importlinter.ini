[importlinter]
root_package = project

[importlinter:contract:domain_is_pure]
name = Domain must not import infrastructure or interfaces
type = forbidden
source_modules =
    project.domain
forbidden_modules =
    project.adapters
    project.interfaces

[importlinter:contract:interfaces_are_independent]
name = Interfaces should not depend on each other
type = independence
modules =
    project.interfaces.cli
    project.interfaces.api
    project.interfaces.ui

